    #site-header .logo-link{display:flex;align-items:center;gap:12px;text-decoration:none}
    #site-header .logo-text{text-align:left;line-height:1}

    :root{--footer-brand-w:420px}
    #site-footer .footer-brand{display:block;text-align:left;max-width:var(--footer-brand-w);margin-left:0;padding-left:0}
    #site-footer .footer-brand .logo-link{display:flex;align-items:center;gap:12px;text-decoration:none}

    #site-footer .footer-brand .logo-text{line-height:1;text-align:left}
    #site-footer .footer-brand p{margin-top:12px;text-align:justify;color:var(--white);max-width:100%;font-size:15px;line-height:1.5}
    @media (max-width:720px){#site-footer .footer-brand .logo-icon img{height:44px}}

</head>

  <p>Redirecting to <a href="https://www.morningstarinfra.com/blog/blog.html">Blog</a>…</p>
